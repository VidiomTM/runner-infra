name: Runner Monitor

on:
  schedule:
    # Every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health:
    name: Health Check
    runs-on: ubuntu-latest
    steps:
      - name: List runners and alert on capacity drop
        uses: actions/github-script@v7
        with:
          script: |
            const org = process.env.ORG_NAME || 'VidiomTM';
            const expected = Number(process.env.EXPECTED_RUNNERS || 5);
            const minAvailable = Number(process.env.MIN_AVAILABLE || 3);
            const monitorRepo = process.env.MONITOR_REPO || 'runner-infra';

            // `github` is already an Octokit instance authenticated with GITHUB_TOKEN.
            // GITHUB_TOKEN has repo + read:org scope but NOT org:admin,
            // so the org-level endpoint will 403. We fall back to the repo-level
            // endpoint, which lists runners assigned to the monitor repo.
            //
            // For full org-level visibility, add a PAT with org:admin as the
            // RUNNER_MONITOR_TOKEN secret and uncomment the conditional below.

            let runners = [];
            let usingFallback = true;
            let tokenNote = 'GITHUB_TOKEN (repo-level only)';

            // Uncomment when RUNNER_MONITOR_TOKEN is configured:
            // if (process.env.RUNNER_MONITOR_TOKEN) {
            //   const customOctokit = github.getOctokit(process.env.RUNNER_MONITOR_TOKEN);
            //   try {
            //     runners = await customOctokit.paginate(
            //       customOctokit.rest.actions.listSelfHostedRunnersForOrg,
            //       { org, per_page: 100 }
            //     );
            //     usingFallback = false;
            //     tokenNote = 'RUNNER_MONITOR_TOKEN (org-level)';
            //   } catch (err) {
            //     core.warning(`PAT failed (${err.status}), falling back`);
            //   }
            // }

            if (usingFallback) {
              try {
                runners = await github.paginate(
                  github.rest.actions.listSelfHostedRunnersForRepo,
                  { owner: org, repo: monitorRepo, per_page: 100 }
                );
              } catch (err) {
                core.warning(`Repo-level listing failed: ${err.status}`);
                runners = [];
              }
            }

            const online = runners.filter(r => r.status === 'online');
            const busy = online.filter(r => r.busy);
            const idle = online.filter(r => !r.busy);
            const offline = runners.filter(r => r.status === 'offline');

            const summary = {
              total: runners.length,
              online: online.length,
              busy: busy.length,
              idle: idle.length,
              offline: offline.length,
              expected,
              minAvailable,
            };

            core.info('=== Runner Health ===');
            core.info(`Source: ${tokenNote}`);
            core.info(`Total registered: ${summary.total}`);
            core.info(`Online: ${summary.online} (busy=${summary.busy}, idle=${summary.idle})`);
            core.info(`Offline: ${summary.offline}`);
            core.info(`Expected online: ${summary.expected}`);

            const lines = [];
            for (const r of runners) {
              const status = r.status === 'online' ? (r.busy ? 'busy' : 'idle') : 'OFFLINE';
              lines.push(`  [${status}] ${r.name} (${r.os})`);
            }
            core.info(lines.join('\n'));

            const issues = [];
            if (summary.total > 0 && summary.online < summary.expected) {
              issues.push(`${summary.expected - summary.online} runner(s) offline (expected ${summary.expected}, got ${summary.online})`);
            }
            if (summary.total > 0 && summary.idle < summary.minAvailable && summary.online >= summary.expected) {
              issues.push(`Only ${summary.idle} idle runner(s) available (min ${summary.minAvailable})`);
            }

            if (issues.length > 0) {
              const { data: openIssues } = await github.rest.issues.listForRepo({
                owner: org,
                repo: monitorRepo,
                state: 'open',
                labels: 'runners',
              });

              const hasOpenAlert = openIssues.some(i => i.title.startsWith('Runner capacity alert'));

              if (!hasOpenAlert) {
                const body = [
                  '## ⚠️ Runner Capacity Issue',
                  '',
                  ...issues,
                  '',
                  '### Current State',
                  `- Online: ${summary.online} / ${summary.expected} expected`,
                  `- Busy: ${summary.busy}`,
                  `- Idle: ${summary.idle}`,
                  `- Offline: ${summary.offline}`,
                  `- Visibility: ${tokenNote}`,
                  '',
                  '### Runners',
                  ...(lines.length > 0 ? lines : ['  (no runners visible from this perspective)']),
                  '',
                  '### Remediation',
                  '1. SSH into the Mac host',
                  '2. Check launchd status: `launchctl list | grep vidiomtm`',
                  '3. Check logs: `tail -100 ~/runners/mac-ci-N/runner.log`',
                  '4. Force restart: `launchctl kickstart -k gui/$(id -u)/com.vidiomtm.runner.mac-ci-N`',
                  '5. If permanently down, re-register using [runner-infra/scripts/bootstrap.sh](https://github.com/VidiomTM/runner-infra/blob/main/scripts/bootstrap.sh)',
                  '6. Stuck-busy runners are auto-cleaned every 15 min by [runner-hygiene](https://github.com/VidiomTM/runner-hygiene)',
                  '',
                  '---',
                  `Auto-generated by runner-monitor workflow run #${context.runNumber}`,
                ].join('\n');

                await github.rest.issues.create({
                  owner: org,
                  repo: monitorRepo,
                  title: `Runner capacity alert: ${summary.online}/${summary.expected} online`,
                  body,
                  labels: ['runners'],
                });

                core.warning(`Created alert issue. Issues: ${issues.join('; ')}`);
              } else {
                core.info('Open alert issue already exists, not creating a duplicate');
              }

              core.setFailed(issues.join('; '));
            } else {
              core.info(summary.total === 0
                ? 'No runners visible. Add a PAT with org:admin scope as RUNNER_MONITOR_TOKEN to enable org-level visibility.'
                : 'All checks passed');
            }
        env:
          ORG_NAME: VidiomTM
          EXPECTED_RUNNERS: '5'
          MIN_AVAILABLE: '3'
          MONITOR_REPO: runner-infra
