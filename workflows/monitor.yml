name: Runner Monitor

on:
  schedule:
    # Every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health:
    name: Health Check
    runs-on: ubuntu-latest
    steps:
      - name: List runners and alert on capacity drop
        uses: actions/github-script@v7
        with:
          script: |
            const org = process.env.ORG_NAME || 'VidiomTM';
            const expected = Number(process.env.EXPECTED_RUNNERS || 5);
            const minAvailable = Number(process.env.MIN_AVAILABLE || 3);
            const monitorRepo = process.env.MONITOR_REPO || 'runner-infra';

            // Prefer PAT (org:admin) for full visibility. Fall back to GITHUB_TOKEN
            // which can only see runners assigned to runner-infra's repo group.
            const token = process.env.RUNNER_MONITOR_TOKEN || process.env.GITHUB_TOKEN;
            const gh = github.getOctokit(token);

            let runners = [];
            let usingFallback = false;

            try {
              runners = await gh.paginate(
                gh.rest.actions.listSelfHostedRunnersForOrg,
                { org, per_page: 100 }
              );
            } catch (err) {
              if (err.status === 403 || err.status === 404) {
                core.warning(`Cannot list org runners (status ${err.status}). Falling back to repo-level listing.`);
                usingFallback = true;
                try {
                  runners = await gh.paginate(
                    gh.rest.actions.listSelfHostedRunnersForRepo,
                    { owner: org, repo: monitorRepo, per_page: 100 }
                  );
                } catch (err2) {
                  core.warning(`Cannot list repo runners either (status ${err2.status}). Using empty list.`);
                  runners = [];
                }
              } else {
                throw err;
              }
            }

            const online = runners.filter(r => r.status === 'online');
            const busy = online.filter(r => r.busy);
            const idle = online.filter(r => !r.busy);
            const offline = runners.filter(r => r.status === 'offline');

            const summary = {
              total: runners.length,
              online: online.length,
              busy: busy.length,
              idle: idle.length,
              offline: offline.length,
              expected,
              minAvailable,
              usingFallback,
            };

            core.info('=== Runner Health ===');
            core.info(`Source: ${usingFallback ? 'repo-level (limited visibility)' : 'org-level'}`);
            core.info(`Total registered: ${summary.total}`);
            core.info(`Online: ${summary.online} (busy=${summary.busy}, idle=${summary.idle})`);
            core.info(`Offline: ${summary.offline}`);
            core.info(`Expected online: ${summary.expected}`);

            const lines = [];
            for (const r of runners) {
              const status = r.status === 'online' ? (r.busy ? 'busy' : 'idle') : 'OFFLINE';
              lines.push(`  [${status}] ${r.name} (${r.os})`);
            }
            core.info(lines.join('\n'));

            const issues = [];
            if (summary.online < expected) {
              issues.push(`${expected - summary.online} runner(s) offline (expected ${summary.expected}, got ${summary.online})`);
            }
            if (summary.idle < minAvailable && summary.online >= expected) {
              issues.push(`Only ${summary.idle} idle runner(s) available (min ${summary.minAvailable})`);
            }

            if (issues.length > 0) {
              // Check if there's already an open alert issue — don't spam
              const { data: openIssues } = await github.rest.issues.listForRepo({
                owner: org,
                repo: monitorRepo,
                state: 'open',
                labels: 'runners',
              });

              const hasOpenAlert = openIssues.some(i => i.title.startsWith('Runner capacity alert'));

              if (!hasOpenAlert) {
                const body = [
                  '## ⚠️ Runner Capacity Issue',
                  '',
                  ...issues,
                  '',
                  '### Current State',
                  `- Online: ${summary.online} / ${summary.expected} expected`,
                  `- Busy: ${summary.busy}`,
                  `- Idle: ${summary.idle}`,
                  `- Offline: ${summary.offline}`,
                  `- Visibility: ${usingFallback ? 'repo-level (limited)' : 'org-level'}`,
                  '',
                  '### Runners',
                  ...(lines.length > 0 ? lines : ['  (no runners visible — configure RUNNER_MONITOR_TOKEN for full visibility)']),
                  '',
                  '### Remediation',
                  '1. SSH into the Mac host',
                  '2. Check launchd status: `launchctl list | grep vidiomtm`',
                  '3. Check logs: `tail -100 ~/runners/mac-ci-N/runner.log`',
                  '4. Force restart: `launchctl kickstart -k gui/$(id -u)/com.vidiomtm.runner.mac-ci-N`',
                  '5. If permanently down, re-register using [runner-infra/scripts/bootstrap.sh](https://github.com/VidiomTM/runner-infra/blob/main/scripts/bootstrap.sh)',
                  '6. Stuck-busy runners are auto-cleaned every 15 min by [runner-hygiene](https://github.com/VidiomTM/runner-hygiene)',
                  '',
                  '### Setup Note',
                  usingFallback ? 'Add a PAT with `org:admin` scope as `RUNNER_MONITOR_TOKEN` secret to enable full org-level visibility.' : null,
                  '',
                  '---',
                  `Auto-generated by runner-monitor workflow run #${context.runNumber}`,
                ].filter(Boolean).join('\n');

                await github.rest.issues.create({
                  owner: org,
                  repo: monitorRepo,
                  title: `Runner capacity alert: ${summary.online}/${summary.expected} online`,
                  body,
                  labels: ['runners'],
                });

                core.warning(`Created alert issue. Issues: ${issues.join('; ')}`);
              } else {
                core.info('Open alert issue already exists, not creating a duplicate');
              }

              core.setFailed(issues.join('; '));
            } else {
              core.info('All checks passed');
            }
        env:
          ORG_NAME: ${{ vars.ORG_NAME }}
          EXPECTED_RUNNERS: ${{ vars.EXPECTED_RUNNERS }}
          MIN_AVAILABLE: ${{ vars.MIN_AVAILABLE }}
          MONITOR_REPO: ${{ vars.MONITOR_REPO }}
          RUNNER_MONITOR_TOKEN: ${{ secrets.RUNNER_MONITOR_TOKEN }}
